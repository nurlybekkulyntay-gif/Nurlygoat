<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task Manager - Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/m.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">STM</div>
    <h1>Create Account</h1>
    <p>Start building a focused study routine</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="userId">Student ID</label>
        <input id="userId" name="userId" type="text" required />
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
        <div class="helper-text">At least 8 characters, 1 letter, 1 number, 1 symbol</div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" required />
      </div>
      <button class="btn" type="submit">Register</button>
    </form>

    <p class="helper-text text-center" style="margin-top: 16px;">
      Already have an account? <a href="/login">Login</a>
    </p>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/static/shared.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
